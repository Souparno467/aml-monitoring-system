services:
  - type: web
    name: aml-api
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      # Free tier note: persistent disks are not supported, so SQLite will be ephemeral (resets on redeploy).
      # For persistence on free tier, set DATABASE_URL to a free Postgres provider (Neon/Supabase/etc).
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./aml.db
      # NOTE: CORS is not auth; this is just to make browser usage work without a domain.
      - key: ALLOWED_ORIGINS
        value: "*"
      # Seed some demo data so the UI isn't empty after deploy.
      - key: AUTO_SEED_DEMO
        value: "true"
      # Recommended: use Render Postgres instead of SQLite
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: aml-postgres
      #     property: connectionString

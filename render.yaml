services:
  - type: web
    name: aml-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      # Set this to your Vercel domain after you deploy the frontend
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
      # Wire this to Render Redis (or set manually)
      - key: REDIS_URL
        fromService:
          type: redis
          name: aml-redis
          property: connectionString
      # Recommended: use Render Postgres instead of SQLite
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: aml-postgres
      #     property: connectionString

  - type: worker
    name: aml-worker
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    dockerCommand: celery -A app.workers.celery_worker:celery_app worker --loglevel=info -Q transactions,alerts -c 2
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
      - key: REDIS_URL
        fromService:
          type: redis
          name: aml-redis
          property: connectionString
      # Use the same DATABASE_URL as the API if you add Postgres
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: aml-postgres
      #     property: connectionString

  - type: redis
    name: aml-redis
    ipAllowList: []

services:
  - type: web
    name: aml-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      # Set this to your Vercel domain after you deploy the frontend
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
      # Recommended: use Render Postgres instead of SQLite
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: aml-postgres
      #     property: connectionString
